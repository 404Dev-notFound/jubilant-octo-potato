<div class="glass-panel rounded-2xl border-t-4 border-t-primary overflow-hidden shadow-2xl max-w-2xl w-full mx-auto animate-fade-in-up max-h-[90vh] overflow-y-auto">
    <div class="flex justify-between items-center p-md border-b border-white/5 bg-surface-container sticky top-0 z-10 backdrop-blur-md">
        <h3 class="font-bold text-xl text-on-surface flex items-center gap-xs">
            <span class="material-symbols-outlined text-primary">edit_square</span>
            Edit Profile
        </h3>
        <button data-close-modal class="text-on-surface-variant hover:text-error transition-colors p-1">
            <span class="material-symbols-outlined">close</span>
        </button>
    </div>
    
    <div class="p-xl">
        <form id="editProfileForm" class="space-y-lg" onsubmit="event.preventDefault(); window.UI.closeModal(); window.UI.showToast('Profile updated successfully!', 'success');">
            
            <div class="flex items-center gap-md">
                <div class="w-20 h-20 rounded-full bg-surface-variant flex items-center justify-center overflow-hidden border-2 border-primary/50">
                    <span class="material-symbols-outlined text-[32px] text-on-surface-variant">person</span>
                </div>
                <div class="flex-1">
                    <label class="block text-sm font-label-sm text-on-surface mb-xs">Avatar URL</label>
                    <input type="url" placeholder="https://example.com/avatar.png" class="w-full bg-surface-container border border-white/10 rounded-xl px-md py-sm text-on-surface outline-none focus:border-primary transition-colors">
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-label-sm text-on-surface mb-xs">Bio</label>
                <textarea rows="3" placeholder="Tell the community a little about yourself..." class="w-full bg-surface-container border border-white/10 rounded-xl px-md py-sm text-on-surface outline-none focus:border-primary transition-colors resize-none"></textarea>
            </div>

            <div>
                <label class="block text-sm font-label-sm text-on-surface mb-xs">Skills (comma separated)</label>
                <input type="text" placeholder="e.g. JavaScript, Python, UI Design" class="w-full bg-surface-container border border-white/10 rounded-xl px-md py-sm text-on-surface outline-none focus:border-primary transition-colors">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-md">
                <div>
                    <label class="block text-sm font-label-sm text-on-surface mb-xs">Twitter / X URL</label>
                    <input type="url" placeholder="https://twitter.com/username" class="w-full bg-surface-container border border-white/10 rounded-xl px-md py-sm text-on-surface outline-none focus:border-primary transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-label-sm text-on-surface mb-xs">LinkedIn URL</label>
                    <input type="url" placeholder="https://linkedin.com/in/username" class="w-full bg-surface-container border border-white/10 rounded-xl px-md py-sm text-on-surface outline-none focus:border-primary transition-colors">
                </div>
            </div>
            
            <div class="flex justify-end gap-sm pt-md border-t border-white/5">
                <button type="button" data-close-modal class="px-xl py-md bg-surface-variant text-on-surface rounded-xl font-bold hover:bg-outline-variant transition-colors">
                    Cancel
                </button>
                <button type="submit" class="px-xl py-md bg-primary text-on-primary rounded-xl font-bold shadow-lg shadow-primary/20 hover:scale-[1.02] transition-transform flex items-center gap-xs">
                    Save Changes <span class="material-symbols-outlined text-sm">save</span>
                </button>
            </div>
        </form>
    </div>
</div>
